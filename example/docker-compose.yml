services:
  iris:
    image: intersystems/iris-community:latest
    ports:
      - "1972:1972"
      - "52773:52773"
    environment:
      - ISC_DATA_DIRECTORY=/usr/irissys/mgr/IRIS.DAT
    command: --key /usr/irissys/mgr/iris.key --namespace USER

  mcp-client:
    build:
      context: ..
      dockerfile: example/Dockerfile
    environment:
      - IRIS_HOSTNAME=iris
      - IRIS_PORT=1972
      - IRIS_NAMESPACE=USER
      - IRIS_USERNAME=_SYSTEM
      - IRIS_PASSWORD=SYS
    depends_on:
      - iris
